<svg xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc" viewBox="0 0 1200 360">
  <title id="title">ratacat animated green block marquee</title>
  <desc id="desc">Green blocks slide in through invisible channels to form ratacat, the subtitle appears, then the blocks fade out.</desc>
  <defs>
    <linearGradient id="backdrop" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#05080d"/>
      <stop offset="0.54" stop-color="#0d1117"/>
      <stop offset="1" stop-color="#10171f"/>
    </linearGradient>

    <clipPath id="stage-clip">
      <rect x="42" y="42" width="1116" height="276" rx="14"/>
    </clipPath>

    <filter id="soft-green" x="-12%" y="-18%" width="124%" height="136%">
      <feGaussianBlur stdDeviation="1.15" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <rect id="cell" width="13" height="13" rx="3"/>

    <style>
      .bit {
        animation: channel-in 7.8s cubic-bezier(.2,.82,.2,1) infinite;
        animation-delay: var(--delay, 0ms);
        opacity: 0;
        transform-box: fill-box;
        transform-origin: center;
      }

      .g0 { fill: #2ea043; }
      .g1 { fill: #39d353; }
      .g2 { fill: #56d364; }
      .g3 { fill: #7ee787; }
      .g4 { fill: #9be9a8; }

      .lane-left { --ix: -330px; --iy: 0px; }
      .lane-right { --ix: 330px; --iy: 0px; }
      .lane-top { --ix: 0px; --iy: -180px; }
      .lane-bottom { --ix: 0px; --iy: 180px; }
      .lane-left-deep { --ix: -460px; --iy: 0px; }
      .lane-right-deep { --ix: 460px; --iy: 0px; }
      .lane-top-soft { --ix: 0px; --iy: -130px; }
      .lane-bottom-soft { --ix: 0px; --iy: 130px; }

      .subtitle {
        animation: subtitle-pop 7.8s ease-in-out infinite;
        opacity: 0;
        transform-box: fill-box;
        transform-origin: center;
      }

      @keyframes channel-in {
        0% {
          opacity: 0;
          transform: translate(var(--ix), var(--iy)) scale(.72);
        }
        17% {
          opacity: .95;
        }
        34%, 58% {
          opacity: 1;
          transform: translate(0, 0) scale(1);
        }
        100% {
          opacity: 0;
          transform: translate(0, 0) scale(1);
        }
      }

      @keyframes subtitle-pop {
        0%, 31% {
          opacity: 0;
          transform: translateY(7px) scale(.985);
        }
        38%, 58% {
          opacity: 1;
          transform: translateY(0) scale(1);
        }
        100% {
          opacity: 0;
          transform: translateY(0) scale(1);
        }
      }

      @media (prefers-reduced-motion: reduce) {
        .bit, .subtitle { animation: none; opacity: 1; transform: none; }
      }
    </style>
  </defs>

  <rect width="1200" height="360" rx="28" fill="url(#backdrop)"/>
  <rect x="36" y="36" width="1128" height="288" rx="18" fill="#0d1117" stroke="#263241"/>

  <g clip-path="url(#stage-clip)" filter="url(#soft-green)">
