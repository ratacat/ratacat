<svg xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc" viewBox="0 0 1200 360">
  <title id="title">ratacat animated block marquee</title>
  <desc id="desc">Contribution-grid blocks move into place to form the word ratacat, then drift apart.</desc>
  <defs>
    <linearGradient id="backdrop" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#06090f"/>
      <stop offset="0.52" stop-color="#0d1117"/>
      <stop offset="1" stop-color="#121a25"/>
    </linearGradient>

    <pattern id="cells-base" width="18" height="18" patternUnits="userSpaceOnUse">
      <rect x="3" y="3" width="11" height="11" rx="2.5" fill="#182330"/>
    </pattern>

    <clipPath id="grid-clip">
      <rect x="42" y="42" width="1116" height="276" rx="14"/>
    </clipPath>

    <rect id="cell" width="13" height="13" rx="3"/>

    <style>
      .bit {
        animation: assemble 7.5s cubic-bezier(.2,.8,.2,1) infinite;
        animation-delay: var(--delay, 0ms);
        opacity: 0;
        transform-box: fill-box;
        transform-origin: center;
      }

      .g0 { fill: #39d353; }
      .g1 { fill: #2f81f7; }
      .g2 { fill: #f2cc60; }
      .g3 { fill: #d2a8ff; }
      .g4 { fill: #9be9a8; }

      .from-n { --ix: 0px; --iy: -170px; --ox: 34px; --oy: 96px; }
      .from-s { --ix: 0px; --iy: 170px; --ox: -34px; --oy: -96px; }
      .from-e { --ix: 300px; --iy: 0px; --ox: -120px; --oy: -48px; }
      .from-w { --ix: -300px; --iy: 0px; --ox: 120px; --oy: 48px; }
      .from-ne { --ix: 230px; --iy: -150px; --ox: -96px; --oy: 80px; }
      .from-nw { --ix: -230px; --iy: -150px; --ox: 96px; --oy: 80px; }
      .from-se { --ix: 230px; --iy: 150px; --ox: -96px; --oy: -80px; }
      .from-sw { --ix: -230px; --iy: 150px; --ox: 96px; --oy: -80px; }

      .spark {
        animation: flicker 5.4s ease-in-out infinite;
        opacity: .16;
      }
      .s1 { animation-delay: .8s; }
      .s2 { animation-delay: 1.6s; }
      .s3 { animation-delay: 2.4s; }

      @keyframes assemble {
        0% {
          opacity: 0;
          transform: translate(var(--ix), var(--iy)) scale(.55);
        }
        18% {
          opacity: .9;
        }
        36%, 68% {
          opacity: 1;
          transform: translate(0, 0) scale(1);
        }
        100% {
          opacity: 0;
          transform: translate(var(--ox), var(--oy)) scale(.65);
        }
      }

      @keyframes flicker {
        0%, 100% { opacity: .1; }
        45%, 62% { opacity: .34; }
      }

      @media (prefers-reduced-motion: reduce) {
        .bit, .spark { animation: none; opacity: 1; transform: none; }
      }
    </style>
  </defs>

  <rect width="1200" height="360" rx="28" fill="url(#backdrop)"/>
  <rect x="36" y="36" width="1128" height="288" rx="18" fill="#0d1117" stroke="#263241"/>

  <g clip-path="url(#grid-clip)">
    <rect x="42" y="42" width="1116" height="276" fill="url(#cells-base)"/>
    <g fill="#2f81f7">
      <use class="spark s1" href="#cell" x="156" y="96"/>
      <use class="spark s2" href="#cell" x="1002" y="78"/>
      <use class="spark s3" href="#cell" x="1020" y="240"/>
